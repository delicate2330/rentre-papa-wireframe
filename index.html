<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>수신함 / 구성원 — 파파 그룹핑(OPD-79)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif; }
    body { display: flex; height: 100vh; background: #f5f5f7; color: #222; font-size: 14px; }

    /* ── 아이콘 사이드바 ── */
    .icon-sidebar {
      width: 56px; background: #fff; border-right: 1px solid #e0e0e0;
      display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 8px;
    }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 8px; background: #f0f0f0;
      display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; position: relative;
    }
    .icon-btn.active { background: #e8e8f8; }
    .icon-btn svg { width: 20px; height: 20px; stroke: #888; fill: none; stroke-width: 2; }
    .icon-btn.active svg { stroke: #5b5fcf; }
    .icon-btn .tip {
      display:none; position:absolute; left:46px; top:50%; transform:translateY(-50%);
      background:#333; color:#fff; font-size:11px; padding:3px 7px; border-radius:5px; white-space:nowrap; z-index:20;
    }
    .icon-btn:hover .tip { display:block; }
    .avatar-btn {
      width: 40px; height: 40px; border-radius: 50%; background: #dde; border: none; cursor: pointer;
      position: relative; font-size: 11px; color: #555; display: flex; align-items: center; justify-content: center;
    }
    .avatar-btn .badge { position: absolute; top: 1px; right: 1px; width: 10px; height: 10px; border-radius: 50%; background: #e55; border: 1.5px solid #fff; }
    .avatar-label { font-size: 10px; color: #999; margin-top: 2px; }
    .icon-sidebar-bottom { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 8px; }

    /* ── 수신함 사이드바 ── */
    .inbox-sidebar { width: 260px; background: #f8f8fb; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; overflow: hidden; }
    .inbox-header { padding: 18px 16px 10px; font-size: 18px; font-weight: 700; }
    .btn-start { margin: 0 12px 12px; padding: 10px; background: #3a3de8; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; }
    .toggle-row { margin: 0 12px 4px; padding: 8px 12px; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: #888; }
    .toggle-badge { background: #eee; border-radius: 4px; padding: 2px 7px; font-size: 11px; margin-right: 4px; }
    .sidebar-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }
    .section-title { padding: 10px 16px 4px; font-size: 12px; font-weight: 700; color: #444; }
    .nav-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; cursor: pointer; border-radius: 6px; margin: 1px 8px; gap: 8px; }
    .nav-item:hover, .nav-item.active { background: #eaeaf8; }
    .nav-item .label { display: flex; align-items: center; gap: 8px; color: #444; }
    .nav-item .count { font-size: 12px; color: #888; }
    .count-badge { background: #f87; color: #fff; border-radius: 10px; font-size: 11px; padding: 1px 7px; }
    .icon-box { width: 18px; height: 18px; background: #ddd; border-radius: 3px; display: inline-block; }
    .sub-item { padding-left: 32px; }
    .grp-caret { display:inline-flex; width:14px; justify-content:center; color:#aaa; font-size:10px; cursor:pointer; margin-right:2px; }
    .grp-caret:hover { color:#5b5fcf; }
    .nav-item.nav-hidden { display:none; }
    .divider { height: 1px; background: #e8e8e8; margin: 8px 12px; }
    .group-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 4px; }
    .group-header span { font-size: 12px; color: #999; }
    .group-header button { background: none; border: none; font-size: 16px; color: #aaa; cursor: pointer; }
    .group-item { display: flex; align-items: center; gap: 8px; padding: 6px 16px; cursor: pointer; }
    .group-item:hover { background: #eaeaf8; border-radius: 6px; margin: 0 8px; padding: 6px 8px; }
    .group-avatar { width: 22px; height: 22px; background: #ddd; border-radius: 50%; flex-shrink: 0; }
    .group-name { font-size: 13px; color: #444; }

    /* ── 수신함 사이드바 구성원 그룹핑 ── */
    .mg-panel { margin: 4px 8px 8px; background:#fff; border:1px solid #e8e8ee; border-radius:10px; padding:10px; }
    .mg-head { display:flex; align-items:center; gap:6px; padding:2px 2px 8px; cursor:pointer; }
    .mg-head .t { font-size:14px; font-weight:700; }
    .mg-head .n { font-size:13px; color:#888; }
    .mg-head .unread-total { margin-left:auto; background:#f0455a; color:#fff; border-radius:11px; font-size:11px; font-weight:700; padding:2px 9px; }
    .mg-head .arrow { color:#bbb; font-size:12px; }
    .mg-select { width:100%; margin-bottom:6px; padding:8px 10px; border:1px solid #e2e2e8; border-radius:8px; font-size:12px; color:#555; background:#fff; }
    .mg-btns { display:flex; gap:6px; margin:2px 0 8px; }
    .mg-btns button { flex:1; padding:7px 0; border:1px solid #e2e2e8; border-radius:8px; background:#fff; font-size:12px; color:#555; cursor:pointer; }
    .mg-btns button:hover { background:#f5f5f8; }
    .mg-check { display:flex; align-items:center; justify-content:space-between; font-size:12px; color:#555; padding:2px 2px 8px; }
    .mg-check label { display:flex; align-items:center; gap:6px; cursor:pointer; }
    .mg-sort { color:#3a3de8; cursor:pointer; }
    .mg-tree { display:block; }
    .mg-tree.collapsed { display:none; }
    .mg-section-head { display:flex; align-items:center; gap:6px; padding:8px 2px 4px; font-size:12px; font-weight:700; }
    .mg-section-head .dot { width:7px; height:7px; border-radius:50%; background:#1a9c5b; }
    .mg-section-head.resigned .dot { background:#bbb; }
    .mg-section-head .meta { margin-left:auto; font-size:11px; color:#999; font-weight:500; }
    .mg-section-head .meta .u { color:#f0455a; font-weight:700; }
    .mg-grp-head { display:flex; align-items:center; gap:6px; padding:5px 2px 2px; font-size:12px; }
    .mg-grp-head .gl { font-weight:600; }
    /* 역할: 관리자=볼드 강조 / 컨설턴트=일반 */
    .mg-grp-head.lv-role { padding-top:8px; margin-top:5px; border-top:1px solid #ececf1; }
    .mg-grp-head.lv-role.admin .gl { color:#2b2b2b; font-weight:800; font-size:12px; }
    .mg-grp-head.lv-role.consultant .gl { color:#888; font-weight:400; font-size:12px; }
    /* 카테고리: 좌측 컬러바로 명확히 구분 */
    .mg-grp-head.lv-category { margin-top:3px; cursor:pointer; }
    .mg-grp-head.lv-category .gl { color:#3a3de8; font-weight:700; font-size:12px; border-left:3px solid #3a3de8; padding-left:7px; line-height:1.1; }
    .mg-grp-head.lv-category .caret { margin-left:auto; color:#bbb; font-size:10px; }
    .mg-cat-body.collapsed { display:none; }
    /* 상담수단(채팅/TM) 칩 */
    .mg-chan-head { padding:6px 2px 3px; }
    .chip-ch { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:3px 11px; border-radius:6px; }
    .chip-ch::before { content:''; width:6px; height:6px; border-radius:50%; background:currentColor; }
    .chip-ch.chat { background:#eef0ff; color:#3a3de8; }
    .chip-ch.tm { background:#fff1e3; color:#d98300; }
    .mg-member { display:flex; align-items:center; gap:8px; padding:6px 4px; border-radius:6px; cursor:pointer; }
    .mg-member:hover { background:#f4f4fb; }
    .mg-member .av { width:22px; height:22px; border-radius:50%; background:#e6e6ef; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .mg-member .av svg { width:13px; height:13px; stroke:#9a9ab0; fill:none; stroke-width:2; }
    .mg-member .nm { font-size:13px; color:#333; }
    .mg-member.has-unread .nm { font-weight:700; }
    .mg-member.resigned .nm { color:#aaa; text-decoration:line-through; }
    .mg-member .ub { margin-left:auto; background:#f0455a; color:#fff; border-radius:11px; font-size:11px; font-weight:700; padding:2px 9px; }
    .mg-member .zero { margin-left:auto; font-size:12px; color:#ccc; }
    .mg-search { width:100%; margin-bottom:6px; padding:8px 10px; border:1px solid #e2e2e8; border-radius:8px; font-size:12px; }

    /* 레드닷 */
    .reddot { width:8px; height:8px; border-radius:50%; background:#f0455a; display:inline-block; flex-shrink:0; }

    /* 내 상담 채널 서브탭 */
    .subtab-group { display:flex; margin:0 12px 8px; gap:4px; }
    .subtab { flex:1; padding:6px; border:1px solid #eee; border-radius:7px; background:#fafafa; cursor:pointer; font-size:12px; color:#666; }
    .subtab.active { background:#eef; color:#3a3de8; border-color:#cdd; font-weight:600; }

    /* 상담방 카드 */
    .room { display:flex; gap:10px; padding:12px 14px; border-bottom:1px solid #f2f2f2; cursor:pointer; position:relative; }
    .room:hover { background:#fafaff; }
    .room.unanswered { background:#fdeeee; }
    .room.unanswered:hover { background:#fbe5e5; }
    .room .av { width:40px; height:40px; border-radius:50%; background:#e6e6ef; flex-shrink:0; position:relative; display:flex; align-items:center; justify-content:center; font-size:14px; color:#778; }
    .room .av .nd { position:absolute; top:-1px; right:-1px; width:12px; height:12px; border-radius:50%; background:#f0455a; border:2px solid #fff; }
    .room .body { flex:1; min-width:0; }
    .room .top { display:flex; align-items:center; gap:6px; }
    .room .nm { font-weight:700; font-size:13px; }
    .room .ch { font-size:10px; padding:1px 6px; border-radius:4px; background:#eef; color:#5558cf; }
    .room .ch.tm { background:#fef0e6; color:#d98300; }
    .room .time { margin-left:auto; font-size:11px; color:#bbb; }
    .room .msg { font-size:12px; color:#888; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:3px; padding-right:70px; }
    .room .tags { margin-top:6px; display:flex; gap:6px; align-items:center; }
    .room .st { font-size:11px; padding:2px 7px; border-radius:4px; background:#f0f0f0; color:#777; }
    .room .un-flag { font-size:11px; color:#d24; font-weight:700; }
    .room .new-flag { font-size:11px; color:#f0455a; font-weight:700; }
    .room.sel { background:#eef0ff; }
    .room.sel.unanswered { background:#fbe0e0; }

    /* 채팅방 뷰 */
    .room-info { display:flex; align-items:center; gap:8px; }
    .room-info .nm { font-weight:700; font-size:14px; color:#333; }
    .room-info .phone-sm { font-size:12px; color:#999; }
    .room-info .ch { font-size:10px; padding:1px 6px; border-radius:4px; background:#eef; color:#5558cf; }
    .room-info .ch.tm { background:#fef0e6; color:#d98300; }
    .room-info .st { font-size:11px; padding:2px 7px; border-radius:4px; background:#f0f0f0; color:#777; }
    .btn-clear-room { margin-left:auto; padding:7px 13px; border:1px solid #f3b0b0; color:#d24; background:#fff; border-radius:7px; font-size:12px; font-weight:600; cursor:pointer; }
    .btn-clear-room:hover { background:#fdecec; }
    .btn-sim { margin-left:auto; padding:6px 11px; border:1px dashed #c9c9d6; color:#777; background:#fafafd; border-radius:7px; font-size:12px; cursor:pointer; }
    .btn-sim:hover { background:#f0f0f6; }
    .un-banner { background:#fdeeee; color:#d24; font-size:12px; padding:7px 14px; text-align:center; }
    .chat-msgs { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px; background:#fbfbfd; }
    .bubble { max-width:70%; padding:9px 13px; border-radius:12px; font-size:13px; line-height:1.45; }
    .bubble.cust { align-self:flex-start; background:#fff; border:1px solid #eee; color:#333; }
    .bubble.agent { align-self:flex-end; background:#3a3de8; color:#fff; }
    .bubble .meta { display:block; font-size:10px; opacity:.7; margin-top:4px; }
    .chat-input { height:56px; border-top:1px solid #e8e8e8; background:#f9f9fb; display:flex; align-items:center; padding:0 14px; gap:8px; }
    .chat-input input { flex:1; padding:10px 12px; border:1px solid #e2e2e8; border-radius:8px; font-size:13px; }
    .chat-input .send { padding:10px 16px; background:#3a3de8; color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }

    /* ── 상담방 목록 ── */
    .chat-list-panel { width: 300px; background: #fff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; overflow: hidden; }
    .panel-header { padding: 16px 14px 8px; display: flex; align-items: center; justify-content: space-between; }
    .panel-header h2 { font-size: 16px; font-weight: 700; }
    .panel-header button { background: none; border: none; cursor: pointer; color: #aaa; font-size: 18px; }
    .tab-group { display: flex; margin: 0 12px 8px; gap: 4px; }
    .tab-btn { flex: 1; padding: 7px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; color: #444; }
    .tab-btn.active { background: #3a3de8; color: #fff; border-color: #3a3de8; }
    .status-tags { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 12px 8px; }
    .tag { padding: 4px 12px; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; color: #555; cursor: pointer; background: #fff; }
    .tag.active { background: #3a3de8; color: #fff; border-color: #3a3de8; }
    .tag-cnt { font-size:11px; color:#aaa; margin-left:2px; }
    .tag.active .tag-cnt { color:#dcdcff; }
    .room-search-wrap { padding: 0 12px 8px; }
    .room-search { width:100%; padding:8px 12px; border:1px solid #e2e2e8; border-radius:8px; font-size:13px; }
    .filter-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 14px; border-top: 1px solid #f0f0f0; font-size: 12px; color: #aaa; cursor: pointer; }
    .chat-list { flex: 1; overflow-y: auto; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; color: #bbb; padding: 40px 0; }
    .empty-icon { width: 44px; height: 44px; border: 2.5px dashed #ccc; border-radius: 8px; }
    .empty-state p { font-size: 13px; }

    /* ── 메인 채팅 ── */
    .chat-main { flex: 1; display: flex; flex-direction: column; background: #fff; overflow: hidden; }
    .chat-topbar { height: 48px; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; padding: 0 20px; gap: 10px; }
    .chat-topbar .skeleton { height: 14px; background: #eee; border-radius: 4px; }
    .chat-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #bbb; }
    .chat-body-icon { width: 48px; height: 44px; background: #eee; border-radius: 6px; }
    .chat-body h3 { font-size: 16px; color: #aaa; font-weight: 600; }
    .chat-body p { font-size: 13px; color: #ccc; text-align: center; line-height: 1.6; }
    .chat-footer { height: 56px; border-top: 1px solid #e8e8e8; background: #f9f9fb; }
    .right-panel { width: 240px; border-left: 1px solid #e0e0e0; background: #fff; }

    /* ── 뷰 전환 ── */
    .view { display: none; flex: 1; }
    .view.active { display: flex; }

    /* ── 구성원 사이드바 ── */
    .members-sidebar { width: 240px; background: #f8f8fb; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
    .members-sidebar .inbox-header { padding: 18px 16px 4px; }
    .members-sidebar .sub-note { padding: 0 16px 12px; font-size: 11px; color: #aaa; }

    /* ── 구성원 메인 ── */
    .members-main { flex: 1; background: #fff; display: flex; flex-direction: column; overflow: hidden; }
    .members-topbar { padding: 18px 24px 12px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; }
    .members-topbar h1 { font-size: 20px; font-weight: 700; }
    .members-topbar .sub { font-size: 12px; color: #999; }
    .members-stat { display: flex; gap: 8px; margin-left: auto; }
    .stat-card { background: #f7f7fb; border: 1px solid #eee; border-radius: 8px; padding: 6px 14px; font-size: 12px; color: #777; }
    .stat-card b { display: block; font-size: 18px; color: #333; margin-top: 2px; }

    /* ── 필터(4단계) ── */
    .filter-panel { padding: 14px 24px 6px; border-bottom: 1px solid #f0f0f0; }
    .filter-line { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .filter-label { width: 64px; font-size: 12px; color: #999; flex-shrink: 0; }
    .flt-grp { margin-bottom: 12px; }
    .flt-h { display:block; font-size:11px; font-weight:700; color:#888; margin-bottom:6px; letter-spacing:.02em; }
    .flt-sublbl { width: 56px; font-size:12px; color:#aaa; flex-shrink:0; }
    /* 대분류 세그먼트 토글 */
    .chips.seg { display:inline-flex; border:1px solid #ddd; border-radius:9px; overflow:hidden; gap:0; }
    .chips.seg .chip { border:none; border-right:1px solid #eee; border-radius:0; padding:8px 20px; font-size:13px; }
    .chips.seg .chip:last-child { border-right:none; }
    .chips.seg .chip.active { background:#3a3de8; color:#fff; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { padding: 4px 12px; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; color: #555; cursor: pointer; background: #fff; }
    .chip.active { background: #3a3de8; color: #fff; border-color: #3a3de8; }
    .filter-foot { display: flex; align-items: center; gap: 10px; padding-top: 4px; }
    .search-box { flex: 1; max-width: 280px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; }
    .btn-reset { padding: 8px 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #666; cursor: pointer; font-size: 13px; }
    .btn-reset:hover { background: #f3f3f3; }

    /* ── 테이블 ── */
    .members-table-wrap { flex: 1; overflow-y: auto; padding: 8px 24px 12px; }
    .members-pager { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; border-top:1px solid #eee; font-size:13px; color:#666; }
    .members-pager .pg-left { display:flex; align-items:center; gap:10px; }
    .members-pager #page-size { padding:5px 8px; border:1px solid #ddd; border-radius:7px; font-size:12px; }
    .members-pager .pg-right { display:flex; align-items:center; gap:8px; }
    .members-pager .pg-btn { padding:6px 12px; border:1px solid #ddd; border-radius:7px; background:#fff; cursor:pointer; font-size:12px; }
    .members-pager .pg-btn:hover:not(:disabled) { background:#f3f3f3; }
    .members-pager .pg-btn:disabled { color:#ccc; cursor:not-allowed; }
    .members-pager .pg-cur { font-size:12px; color:#888; min-width:54px; text-align:center; }
    table.members { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.members th { text-align: left; padding: 10px 12px; color: #999; font-weight: 600; font-size: 12px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; }
    table.members td { padding: 12px; border-bottom: 1px solid #f2f2f2; color: #333; vertical-align: middle; }
    table.members tr:hover td { background: #fafaff; }
    .m-name { display: flex; align-items: center; gap: 10px; font-weight: 600; }
    .m-avatar { width: 30px; height: 30px; border-radius: 50%; background: #dde; flex-shrink: 0; display:flex; align-items:center; justify-content:center; font-size:12px; color:#667; }
    .badge-role { display:inline-block; padding:2px 8px; border-radius:5px; font-size:11px; background:#eef; color:#5558cf; }
    .badge-role.consultant { background:#f1f1f1; color:#777; }
    .status-pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status-active { background: #e6f7ee; color: #1a9c5b; }
    .status-resigned { background: #f0f0f0; color: #999; }
    .row-resigned td { color: #aaa; }
    .actions { display: flex; gap: 6px; }
    .btn-act { padding: 5px 11px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #444; }
    .btn-act:hover { background: #f3f3f3; }
    .btn-resign { border-color: #f3b0b0; color: #d24; }
    .btn-resign:hover { background: #fdecec; }
    .btn-reinstate { border-color: #b6d6c4; color: #1a9c5b; }
    .btn-reinstate:hover { background: #ecf8f1; }
    .btn-act:disabled { background:#f5f5f5; color:#bbb; border-color:#e5e5e5; cursor:not-allowed; }
    .btn-act:disabled:hover { background:#f5f5f5; }

    /* 모달 select */

    .lbl-sub { font-size:11px; color:#aaa; font-weight:400; }
    /* 퇴사 사유 토글 */
    .reason-toggle { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
    .reason-chip { padding:7px 14px; border:1px solid #ddd; border-radius:20px; background:#fff; cursor:pointer; font-size:13px; color:#555; }
    .reason-chip:hover { background:#f5f5f8; }
    .reason-chip.active { background:#d24; color:#fff; border-color:#d24; }
    .resign-roominfo { background:#fff7f0; border:1px solid #f0d9c0; color:#a85a1a; font-size:12px; padding:9px 11px; border-radius:8px; line-height:1.5; }
    /* 상세 패널 - 담당 채팅방 체크리스트 */
    .md-room { display:flex; align-items:center; gap:8px; padding:8px 6px; border:1px solid #f0f0f0; border-radius:8px; margin-bottom:6px; cursor:pointer; }
    .md-room:hover { background:#fafaff; }
    .md-room input { margin:0; flex-shrink:0; }
    .md-room .rn { font-size:13px; font-weight:600; }
    .md-room .rc { font-size:10px; padding:1px 6px; border-radius:4px; background:#eef0ff; color:#3a3de8; }
    .md-room .st-sm { font-size:11px; color:#888; }
    .md-room .un { margin-left:auto; font-size:11px; color:#d24; font-weight:700; }
    .reassign-bar { margin-top:10px; padding:10px; background:#f7f7fb; border:1px solid #eee; border-radius:8px; }
    .reassign-bar .ck-all { display:flex; align-items:center; gap:6px; font-size:12px; color:#555; cursor:pointer; }
    .btn-assign { width:100%; padding:9px; background:#3a3de8; color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
    .btn-assign:hover { background:#3133c0; }
    #reassign-block { margin-bottom:16px; }
    .reassign-hint { font-size:11px; color:#aaa; margin:6px 0 0; line-height:1.4; }
    .reassign-mode { display:flex; flex-wrap:wrap; gap:8px 12px; margin-bottom:8px; }
    .reassign-mode label { display:flex; align-items:center; gap:5px; font-size:12px; color:#555; cursor:pointer; }

    /* 토스트 */
    #toast { position:fixed; left:50%; bottom:32px; transform:translateX(-50%) translateY(20px); background:#2b2b2b; color:#fff; font-size:13px; padding:11px 12px 11px 18px; border-radius:10px; opacity:0; pointer-events:none; transition:all .25s; z-index:200; box-shadow:0 4px 16px rgba(0,0,0,.25); display:flex; align-items:center; gap:14px; }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
    #toast-undo { background:none; border:none; color:#7df3c0; font-size:13px; font-weight:700; cursor:pointer; padding:2px 8px; }
    #toast-undo.hide { display:none; }
    #even-preview { display:none; background:#f7f7fb; border:1px solid #eee; border-radius:8px; padding:10px; }
    #even-preview .ep-head { font-size:12px; color:#555; margin-bottom:6px; padding-bottom:6px; border-bottom:1px solid #e8e8ee; }
    #even-preview .ep-row { display:flex; justify-content:space-between; align-items:center; font-size:12px; padding:4px 0; color:#444; gap:8px; }
    #even-preview .ep-nm { font-weight:600; flex-shrink:0; }
    #even-preview .ep-arrow { color:#1a9c5b; font-weight:700; }
    #even-preview .ep-val { color:#999; text-align:right; flex-shrink:0; font-size:11px; }
    #even-preview .ep-u { color:#d24; font-size:11px; }
    #even-preview .ep-val b { color:#222; }
    #even-preview .ep-row .g { color:#1a9c5b; font-weight:700; }
    #even-preview .ep-empty { font-size:12px; color:#aaa; }

    /* 모달 */
    .modal-back { display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); align-items:center; justify-content:center; z-index:100; }
    .modal-back.show { display:flex; }
    .modal { background:#fff; border-radius:12px; padding:24px; width:360px; }
    .modal h3 { font-size:16px; margin-bottom:6px; }
    .modal p { font-size:13px; color:#777; margin-bottom:16px; line-height:1.5; }
    .modal label { font-size:12px; color:#888; display:block; margin-bottom:4px; }
    .modal input { width:100%; padding:8px 10px; border:1px solid #ddd; border-radius:8px; font-size:13px; margin-bottom:16px; }
    .modal .warn { background:#fff7f7; border:1px solid #f3d6d6; color:#c0392b; font-size:12px; padding:8px 10px; border-radius:8px; margin-bottom:16px; line-height:1.5; }
    .modal-btns { display:flex; gap:8px; justify-content:flex-end; }
    .modal-btns button { padding:8px 16px; border-radius:8px; font-size:13px; cursor:pointer; border:none; }
    .btn-cancel { background:#eee; color:#555; }
    .btn-confirm { background:#d24; color:#fff; }
  </style>
</head>
<body>

  <!-- 아이콘 사이드바 -->
  <aside class="icon-sidebar">

  <!-- ====== 뷰 A: 수신함 ====== -->

        <div class="nav-item" data-mine="new" data-ch=""><span class="label"><span class="reddot"></span> 신규인입</span><span class="count-badge" id="cnt-new">0</span></div>
        <div class="nav-item" data-mine="unanswered" data-ch=""><span class="label"><span class="icon-box" style="background:#f7b3b3;"></span> 미답변</span><span class="count-badge" id="cnt-unans">0</span></div>
        <div class="divider"></div>

        <div class="nav-item" data-team="1" data-mine="all" data-ch=""><span class="label"><span class="icon-box"></span> 전체</span><span class="count" id="tcnt-all">0</span></div>

        <div class="nav-item sub-item" data-team="1" data-group="new" data-mine="new" data-ch="전화"><span class="label"><span class="icon-box"></span> 전화</span><span class="count" id="tcnt-new-tel">0</span></div>
        <div class="nav-item" data-team="1" data-mine="unanswered" data-ch=""><span class="label"><span class="grp-caret" data-toggle="unanswered">▾</span><span class="icon-box" style="background:#f7b3b3;"></span> 미답변</span><span class="count-badge" id="tcnt-unans">0</span></div>

            <option value="">재직 상태: 전체</option>
            <option value="active">재직 상태: 재직자</option>
            <option value="resigned">재직 상태: 퇴사자</option>

      <div class="members-pager" id="members-pager"></div>
    </main>

    <!-- 구성원 상세 패널 -->
    <aside class="member-detail" id="member-detail"></aside>
  </div>

  <div id="toast"><span id="toast-msg"></span><button id="toast-undo">실행취소</button></div>

  <!-- 모달 -->
  <div class="modal-back" id="modal">
    <div class="modal">
      <h3 id="modal-title">퇴사 처리</h3>
      <p id="modal-desc"></p>
      <div id="resign-fields">
        <label>퇴사 사유 <span style="color:#d24">*</span> <span class="lbl-sub">(법적 보관용)</span></label>
        <div class="reason-toggle" id="reason-toggle">
          <button type="button" class="reason-chip" data-r="자발적 퇴사">자발적 퇴사</button>
          <button type="button" class="reason-chip" data-r="권고사직">권고사직</button>
          <button type="button" class="reason-chip" data-r="계약만료">계약만료</button>
          <button type="button" class="reason-chip" data-r="기타">기타</button>
        </div>
        <label>퇴사일</label>
        <input type="date" id="modal-date" />
        <div id="resign-roominfo" class="resign-roominfo"></div>
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-confirm" id="modal-confirm">퇴사 처리</button>
      </div>
    </div>
  </div>

  <script>
    // ── 뷰 전환 ──
    document.querySelectorAll('.icon-btn[data-view]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.icon-btn[data-view]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById('view-' + btn.dataset.view).classList.add('active');
      });
    });

    // ── 구성원 데이터 (기획안 원본 DB 기반) ──
    // state: active=재직 / resigned=퇴사, role: 관리자/컨설턴트, channel: 전화/채팅/'', category: 제품
    let members = [
      { name:'김용일', state:'active',   role:'컨설턴트', channel:'채팅', category:'가전',   leave:'', unread:17, assigned:42 },
      { name:'김민강', state:'active',   role:'컨설턴트', channel:'채팅', category:'가전',   leave:'', unread:3,  assigned:30 },
      { name:'서현동', state:'active',   role:'관리자',   channel:'',     category:'',       leave:'', unread:0,  assigned:0 },
      { name:'렌트리', state:'active',   role:'관리자',   channel:'',     category:'',       leave:'', unread:0,  assigned:0 },
      { name:'이수지', state:'active',   role:'관리자',   channel:'',     category:'',       leave:'', unread:0,  assigned:0 },
      { name:'변슬기', state:'active',   role:'관리자',   channel:'',     category:'',       leave:'', unread:0,  assigned:0 },
      { name:'최송임', state:'active',   role:'관리자',   channel:'',     category:'',       leave:'', unread:0,  assigned:0 },
      { name:'헬로비전', state:'active', role:'관리자',   channel:'',     category:'',       leave:'', unread:0,  assigned:0 },
      { name:'윤민혁', state:'active',   role:'컨설턴트', channel:'채팅', category:'기타',   leave:'', unread:1,  assigned:8 },
      { name:'곽예진', state:'active',   role:'컨설턴트', channel:'채팅', category:'TPS',    leave:'', unread:6,  assigned:35 },
      { name:'전상엽', state:'active',   role:'컨설턴트', channel:'채팅', category:'TPS',    leave:'', unread:2,  assigned:28 },
      { name:'강소정', state:'active',   role:'컨설턴트', channel:'채팅', category:'TPS',    leave:'', unread:12, assigned:40 },
      { name:'윤승현', state:'active',   role:'컨설턴트', channel:'전화', category:'',       leave:'', unread:0,  assigned:20 },
      { name:'정다운', state:'active',   role:'컨설턴트', channel:'채팅', category:'TPS',    leave:'', unread:4,  assigned:33 },
      { name:'채새미', state:'active',   role:'컨설턴트', channel:'채팅', category:'TPS',    leave:'', unread:4,  assigned:31 },
      { name:'길수진', state:'active',   role:'컨설턴트', channel:'전화', category:'',       leave:'', unread:0,  assigned:18 },
      { name:'김성은', state:'resigned', role:'컨설턴트', channel:'채팅', category:'정수기', leave:'2025-11-30', unread:9, assigned:25 },
      { name:'김시인', state:'active',   role:'컨설턴트', channel:'채팅', category:'정수기', leave:'', unread:5,  assigned:27 },
      { name:'임은경', state:'resigned', role:'컨설턴트', channel:'채팅', category:'정수기', leave:'2025-09-15', unread:2, assigned:14 },
      { name:'양송아', state:'active',   role:'컨설턴트', channel:'채팅', category:'정수기', leave:'', unread:0,  assigned:22 },
    ];

    // 사이드바 그룹핑용: 표시 그룹 결정
    function grpOf(m) {
      if (m.role === '관리자') return '관리자';
      if (m.channel === '전화') return 'TM';
      return m.category || '기타';
    }
    const CAT_ORDER = ['가전','정수기','TPS','TM','상조','이사','기타','관리자'];

    // ── 구성원별 담당 채팅방 생성 (체크박스 분배 데모용) ──
    const CUSTS = ['이서준','김지우','박도윤','최하은','정시우','강민서','조유나','윤지호','임수아','한예준','오서연','신준우','권다은','황지안','안채원','배준혁','문서아','양하준','구민준','노은우','서지율','홍시현','류하린','전우진','마유빈'];
    const RSTS = ['상담중','주문확정','설치대기','지원금대기','계약완료'];
    let _cseq = 0, _rid = 1;
    function genRooms() {
      _cseq = 0; _rid = 1;
      members.forEach((m, mi) => {
        m.rooms = [];
        if (m.state === 'active' && m.role === '컨설턴트') {
          const n = 3 + ((mi * 3 + 1) % 4);           // 3~6건
          const unAns = m.unread > 10 ? 2 : (m.unread > 0 ? 1 : 0);
          for (let i = 0; i < n; i++) {
            m.rooms.push({
              id: _rid++,
              cust: CUSTS[_cseq % CUSTS.length],
              category: m.category || '전화',
              status: RSTS[(_cseq + i) % RSTS.length],
              state: i < unAns ? 'unanswered' : 'normal'
            });
            _cseq++;
          }
        }
      });
      recount();
    }
    // 담당/미답변 수를 방 목록에서 재계산
    function recount() {
      members.forEach(m => {
        m.assigned = (m.rooms || []).length;
        m.unread = (m.rooms || []).filter(r => r.state === 'unanswered').length;
      });
    }

    const filters = { status:'', role:'', channel:'', category:'' };
    let pending = null;
    const stateLabel = { active:'재직', resigned:'퇴사' };

    let pageSize = 10;
    let currentPage = 1;

    function render() {
      const body = document.getElementById('members-body');
      const q = document.getElementById('search').value.trim();
      body.innerHTML = '';

      const qActive = q.length >= 2;   // 이름 검색은 2글자 이상부터
      const filtered = members.map((m, idx) => ({ m, idx })).filter(({ m }) => {
        if (filters.status && m.state !== filters.status) return false;
        if (filters.role && m.role !== filters.role) return false;
        if (filters.channel && m.channel !== filters.channel) return false;
        if (filters.category && m.category !== filters.category) return false;
        if (qActive && !m.name.includes(q)) return false;
        return true;
      });
      // 재직자 우선, 퇴사자 후순위 (그 안에서는 원래 순서)
      filtered.sort((a, b) => (a.m.state === 'resigned') - (b.m.state === 'resigned'));

      const total = filtered.length;
      const totalPages = Math.max(1, Math.ceil(total / pageSize));
      if (currentPage > totalPages) currentPage = totalPages;
      const startI = (currentPage - 1) * pageSize;
      const pageItems = filtered.slice(startI, startI + pageSize);

      pageItems.forEach(({ m, idx }) => {
        const tr = document.createElement('tr');
        if (m.state === 'resigned') tr.className = 'row-resigned';
        const roleCls = m.role === '관리자' ? '' : 'consultant';
        const statusCls = m.state === 'resigned' ? 'status-resigned' : 'status-active';
        let actions = m.state === 'active'
          ? `<button class="btn-act btn-resign" onclick="openModal(${idx}, event)">퇴사 처리</button>`
          : `<span class="resigned-tag">퇴사 완료</span>`;
        const unreadCell = m.unread > 0 ? `<span class="u-num">${m.unread}</span>` : '<span class="z-num">0</span>';

        tr.innerHTML = `
          <td><div class="m-name"><span class="m-avatar">${m.name[0]}</span>${m.name}</div></td>
          <td><span class="badge-role ${roleCls}">${m.role}</span></td>
          <td>${m.channel || '-'}</td>
          <td>${m.category || '-'}</td>
          <td>${m.assigned || '-'}</td>
          <td>${unreadCell}</td>
          <td><span class="status-pill ${statusCls}">${stateLabel[m.state]}</span></td>
          <td>${m.leave || '-'}</td>
          <td><div class="actions">${actions}</div></td>`;
        tr.style.cursor = 'pointer';
        tr.addEventListener('click', () => openMemberDetail(idx));
        body.appendChild(tr);
      });
      if (pageItems.length === 0) {
        body.innerHTML = '<tr class="empty-row"><td colspan="9">조건에 맞는 구성원이 없어요.</td></tr>';
      }
      renderPager(total, totalPages, startI, pageItems.length);
      updateCounts();
    }

    function gotoPage(n) { currentPage = n; render(); }

    function renderPager(total, totalPages, startI, count) {
      const pager = document.getElementById('members-pager');
      const from = total ? startI + 1 : 0;
      const to = startI + count;
      pager.innerHTML = `
        <div class="pg-left">총 <b>${total}</b>명 중 ${from}–${to}
          <select id="page-size">
            <option value="10">10명씩</option>
            <option value="20">20명씩</option>
            <option value="100">100명씩</option>
          </select>
        </div>
        <div class="pg-right">
          <button class="pg-btn" ${currentPage<=1?'disabled':''} onclick="gotoPage(${currentPage-1})">‹ 이전</button>
          <span class="pg-cur">${currentPage} / ${totalPages}</span>
          <button class="pg-btn" ${currentPage>=totalPages?'disabled':''} onclick="gotoPage(${currentPage+1})">다음 ›</button>
        </div>`;
      const sel = document.getElementById('page-size');
      sel.value = String(pageSize);
      sel.onchange = e => { pageSize = parseInt(e.target.value, 10); currentPage = 1; render(); };
    }

    function updateCounts() {
      let a = 0, r = 0;
      members.forEach(m => m.state === 'active' ? a++ : r++);
      document.getElementById('q-all').textContent = members.length;
      document.getElementById('q-active').textContent = a;
      document.getElementById('q-resigned').textContent = r;
      document.getElementById('stat-active').textContent = a;
      document.getElementById('stat-resigned').textContent = r;
    }

    // ── 필터 칩 ──
    document.querySelectorAll('.chips').forEach(group => {
      group.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
          group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          filters[group.dataset.group] = chip.dataset.v;
          currentPage = 1;
          syncQuick();
          render();
        });
      });
    });

    // ── 사이드바 바로가기 (재직상태 필터와 연동) ──
    document.querySelectorAll('#view-members .nav-item').forEach(it => {
      it.addEventListener('click', () => {
        const v = it.dataset.quick === 'all' ? '' : it.dataset.quick;
        filters.status = v;
        currentPage = 1;
        const grp = document.querySelector('.chips[data-group="status"]');
        grp.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.v === v));
        syncQuick();
        render();
      });
    });
    function syncQuick() {
      document.querySelectorAll('#view-members .nav-item').forEach(it => {
        const v = it.dataset.quick === 'all' ? '' : it.dataset.quick;
        it.classList.toggle('active', v === filters.status);
      });
    }

    document.getElementById('search').addEventListener('input', () => { currentPage = 1; render(); });
    document.getElementById('reset').addEventListener('click', () => {
      currentPage = 1;
      filters.status = filters.role = filters.channel = filters.category = '';
      document.querySelectorAll('.chips').forEach(g => {
        g.querySelectorAll('.chip').forEach((c,i) => c.classList.toggle('active', i === 0));
      });
      document.getElementById('search').value = '';
      syncQuick();
      render();
    });

    // ── 퇴사/복직 모달 ──
    let pendingMode = 'resign';
    const confirmBtn = document.getElementById('modal-confirm');

    let selectedReason = '';
    function openModal(idx, ev) {  // 퇴사
      if (ev) ev.stopPropagation();
      pending = idx; pendingMode = 'resign';
      selectedReason = '';
      const m = members[idx];
      document.getElementById('modal-title').textContent = '퇴사 처리';
      document.getElementById('modal-desc').textContent =
        `${m.name} 님(${m.role}${m.category ? ' · ' + m.category : ''})을 퇴사 처리합니다.`;
      document.getElementById('resign-fields').style.display = '';
      document.getElementById('modal-date').value = new Date().toISOString().slice(0,10);
      document.querySelectorAll('#reason-toggle .reason-chip').forEach(c => c.classList.remove('active'));
      confirmBtn.textContent = '퇴사 처리';
      // 남은 담당 채팅방 안내
      const ri = document.getElementById('resign-roominfo');
      if (m.assigned > 0) {
        ri.innerHTML = `담당 채팅방 <b>${m.assigned}건</b>이 남아 있어요. 상세 패널에서 다른 담당자에게 이관 후 처리하는 것을 권장합니다. (미이관 시 미배정 처리)`;
        ri.style.display = '';
      } else { ri.style.display = 'none'; }
      document.getElementById('modal').classList.add('show');
    }

    // 퇴사 사유 토글
    document.querySelectorAll('#reason-toggle .reason-chip').forEach(c => {
      c.addEventListener('click', () => {
        document.querySelectorAll('#reason-toggle .reason-chip').forEach(x => x.classList.remove('active'));
        c.classList.add('active');
        selectedReason = c.dataset.r;
      });
    });

    // 토스트 (+ 실행취소)
    let toastTimer = null;
    function showToast(msg, undoFn) {
      const t = document.getElementById('toast');
      document.getElementById('toast-msg').textContent = msg;
      const undoBtn = document.getElementById('toast-undo');
      undoBtn.onclick = null;
      if (undoFn) {
        undoBtn.classList.remove('hide');
        undoBtn.onclick = () => { undoFn(); };
      } else {
        undoBtn.classList.add('hide');
      }
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), undoFn ? 5000 : 2600);
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); pending = null; }

    // 퇴사 확정 (사유 필수 / 남은 담당 채팅방은 미배정 처리)
    confirmBtn.addEventListener('click', () => {
      if (pending === null) return;
      if (!selectedReason) { showToast('퇴사 사유를 선택하세요'); return; }
      const snapshot = JSON.parse(JSON.stringify(members));  // 실행취소용
      const m = members[pending];
      const today = new Date().toISOString().slice(0,10);
      const leftover = m.assigned;
      m.rooms = [];                 // 남은 방은 미배정으로
      m.state = 'resigned';
      m.leave = document.getElementById('modal-date').value || today;
      m.reason = selectedReason;
      m.history = m.history || [];
      m.history.push({ date: today, kind:'resign', reason: selectedReason, leftover });
      recount();

      const wasIdx = pending;
      closeModal();
      render();
      renderTree();
      if (detailIdx === wasIdx) openMemberDetail(wasIdx);
      const tail = leftover > 0 ? ` (미이관 ${leftover}건 미배정)` : '';
      showToast(`${m.name} 님 퇴사 처리 · 사유: ${selectedReason}${tail}`, () => {
        members = snapshot;
        recount();
        render(); renderTree();
        if (detailIdx !== null) openMemberDetail(detailIdx);
        showToast('실행취소됨');
      });
    });

    // ── 구성원 상세 패널 (담당 채팅방 체크박스 → 다른 담당자에게 이관) ──
    let detailIdx = null;
    function openMemberDetail(idx) {
      detailIdx = idx;
      const m = members[idx];
      const panel = document.getElementById('member-detail');
      const myRooms = m.rooms || [];

      // 담당 채팅방 체크리스트
      const roomHtml = myRooms.length
        ? myRooms.map(r => `
            <label class="md-room">
              <input type="checkbox" class="room-ck" value="${r.id}">
              <span class="rn">${r.cust}</span>
              <span class="rc">${r.category}</span>
              <span class="st-sm">${r.status}</span>
              ${r.state==='unanswered'?'<span class="un">미답변</span>':''}
            </label>`).join('')
        : `<div class="md-empty">담당 채팅방이 없어요.</div>`;

      // 이관 대상 드롭다운 (재직 컨설턴트, 본인 제외)
      const cands = members.filter((x,i) => i !== idx && x.state === 'active' && x.role === '컨설턴트');
      const targetOpts = '<option value="">담당자 선택…</option>' +
        cands.map(c => `<option value="${members.indexOf(c)}">${c.name} · ${c.category || c.channel || '-'} (담당 ${c.assigned})</option>`).join('');
      const reassignBar = (m.state === 'active' && myRooms.length)
        ? `<div class="reassign-bar">
             <label class="ck-all"><input type="checkbox" id="ck-all"> 전체 선택</label>
             <select class="modal-select" id="md-target" style="margin:8px 0;">${targetOpts}</select>
             <button class="btn-assign" id="md-assign">선택 채팅방 이관</button>
           </div>`
        : '';

      // 이력
      const hist = (m.history || []).slice().reverse();
      const histHtml = hist.length
        ? hist.map(h => {
            if (h.kind === 'resign') return `<div class="hist out"><span class="hd">${h.date}</span><div class="ht"><b>퇴사 처리</b> · 사유: ${h.reason}${h.leftover?` · 미이관 ${h.leftover}건`:''}</div></div>`;
            if (h.kind === 'out') return `<div class="hist out"><span class="hd">${h.date}</span><div class="ht"><b>채팅방 ${h.n}건 이관</b><div class="hsub">→ ${h.to}</div></div></div>`;
            return `<div class="hist in"><span class="hd">${h.date}</span><div class="ht"><b>${h.from} → +${h.n}건</b> 수신</div></div>`;
          }).join('')
        : '<div class="md-empty">이관/수신 이력이 없어요.</div>';

      const footBtn = m.state === 'active'
        ? `<button class="resign" onclick="openModal(${idx}, event)">퇴사 처리</button>`
        : `<button class="disabled" disabled>퇴사 완료 (${m.leave})</button>`;

      panel.innerHTML = `
        <div class="md-head">
          <span class="av">${m.name[0]}</span>
          <div><div class="nm">${m.name}</div><div class="role">${m.role}${m.category?' · '+m.category:''}${m.state==='resigned'?' · 퇴사':''}</div></div>
          <button class="md-close" onclick="closeMemberDetail()">×</button>
        </div>
        <div class="md-body">
          <div class="md-stats">
            <div class="c">담당 채팅방<b>${m.assigned}</b></div>
            <div class="c unread">미답변<b>${m.unread}</b></div>
          </div>
          <div class="md-section-t">담당 채팅방 ${m.state==='active'&&myRooms.length?'(체크 후 이관)':''}</div>
          ${roomHtml}
          ${reassignBar}
          <div class="md-section-t">이력</div>
          ${histHtml}
        </div>
        <div class="md-foot">${footBtn}</div>`;
      panel.classList.add('show');

      // 전체 선택
      const ckAll = document.getElementById('ck-all');
      if (ckAll) ckAll.addEventListener('change', e => {
        panel.querySelectorAll('.room-ck').forEach(c => c.checked = e.target.checked);
      });
      // 이관 실행
      const assignBtn = document.getElementById('md-assign');
      if (assignBtn) assignBtn.addEventListener('click', () => reassignRooms(idx));
    }

    // 선택 채팅방을 다른 담당자에게 이관
    function reassignRooms(idx) {
      const m = members[idx];
      const ids = [...document.querySelectorAll('#member-detail .room-ck:checked')].map(c => +c.value);
      if (!ids.length) { showToast('이관할 채팅방을 선택하세요'); return; }
      const ti = parseInt(document.getElementById('md-target').value, 10);
      if (isNaN(ti) || !members[ti]) { showToast('이관 대상을 선택하세요'); return; }
      const snapshot = JSON.parse(JSON.stringify(members));
      const today = new Date().toISOString().slice(0,10);
      const moving = m.rooms.filter(r => ids.includes(r.id));
      m.rooms = m.rooms.filter(r => !ids.includes(r.id));
      members[ti].rooms = (members[ti].rooms || []).concat(moving);
      // 이력
      m.history = m.history || []; members[ti].history = members[ti].history || [];
      m.history.push({ date: today, kind:'out', n: moving.length, to: members[ti].name });
      members[ti].history.push({ date: today, kind:'in', n: moving.length, from: m.name });
      recount();
      render(); renderTree();
      openMemberDetail(idx);
      showToast(`${moving.length}건을 ${members[ti].name} 님에게 이관했어요`, () => {
        members = snapshot; recount(); render(); renderTree(); openMemberDetail(idx);
        showToast('실행취소됨');
      });
    }

    function closeMemberDetail() {
      document.getElementById('member-detail').classList.remove('show');
      detailIdx = null;
    }

    // ========= 수신함 사이드바 구성원 그룹핑 =========
    const tree = { state:'', cat:'', unreadOnly:false, sortByUnread:true, q:'' };
    const treeCollapsed = new Set();  // 접힌 카테고리 기억

    // 카테고리 드롭다운 채우기
    (function fillCat(){
      const sel = document.getElementById('mg-cat');
      const present = CAT_ORDER.filter(c => members.some(m => grpOf(m) === c));
      present.forEach(c => {
        const o = document.createElement('option'); o.value = c; o.textContent = '카테고리: ' + c; sel.appendChild(o);
      });
    })();

    // 그룹핑 레벨 정의: 역할 → 상담수단 → 카테고리
    const LEVELS = [
      { key:'role',     cls:'lv-role',     valOf: m => m.role,            order:['관리자','컨설턴트'] },
      { key:'channel',  cls:'lv-channel',  valOf: m => (m.channel==='전화'?'전화(TM)':m.channel), order:['전화(TM)','채팅'] },
      { key:'category', cls:'lv-category', valOf: m => m.category,        order:['가전','정수기','TPS','상조','이사','기타'] },
    ];
    const sumU = arr => arr.reduce((s,m)=>s+m.unread,0);

    function memberRow(m) {
      const el = document.createElement('div');
      el.className = 'mg-member' + (m.unread>0?' has-unread':'') + (m.state==='resigned'?' resigned':'');
      el.innerHTML = `
        <span class="av"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>
        <span class="nm">${m.name}</span>
        ${m.unread>0 ? `<span class="ub">${m.unread}</span>` : `<span class="zero">0</span>`}`;
      return el;
    }

    // 재귀: 주어진 레벨부터 중첩 그룹 렌더
    function renderLevel(list, lvIdx, depth, wrap) {
      if (lvIdx >= LEVELS.length) { // 더 분류할 레벨 없음 → 멤버 출력
        let mem = tree.sortByUnread
          ? list.slice().sort((a,b)=>b.unread-a.unread)
          : list.slice().sort((a,b)=>a.name.localeCompare(b.name,'ko'));
        mem.forEach(m => { const r = memberRow(m); r.style.paddingLeft = (4 + depth*10) + 'px'; wrap.appendChild(r); });
        return;
      }
      const lv = LEVELS[lvIdx];
      // 이 레벨 값이 전부 비어있으면 레벨 건너뜀
      if (list.every(m => !lv.valOf(m))) { renderLevel(list, lvIdx+1, depth, wrap); return; }

      let vals = [...new Set(list.map(lv.valOf).filter(Boolean))];
      vals.sort((a,b) => {
        if (tree.sortByUnread) {
          return sumU(list.filter(m=>lv.valOf(m)===b)) - sumU(list.filter(m=>lv.valOf(m)===a));
        }
        const ia = lv.order.indexOf(a), ib = lv.order.indexOf(b);
        return (ia<0?99:ia) - (ib<0?99:ib);
      });

      vals.forEach(v => {
        const sub = list.filter(m => lv.valOf(m) === v);
        const h = document.createElement('div');
        if (lv.key === 'channel') {
          h.className = 'mg-chan-head';
          h.style.paddingLeft = (2 + depth*10) + 'px';
          const c = (v.indexOf('TM') >= 0 || v.indexOf('전화') >= 0) ? 'tm' : 'chat';
          h.innerHTML = `<span class="chip-ch ${c}">${v}</span>`;
          wrap.appendChild(h);
          renderLevel(sub, lvIdx+1, depth+1, wrap);
        } else if (lv.key === 'category') {
          // 카테고리: 접기/펼치기 토글
          const key = 'cat:' + v + ':' + depth;
          const collapsed = treeCollapsed.has(key);
          h.className = 'mg-grp-head lv-category';
          h.style.paddingLeft = (2 + depth*10) + 'px';
          h.innerHTML = `<span class="gl">${v}</span><span class="caret">${collapsed?'▸':'▾'}</span>`;
          const body = document.createElement('div');
          body.className = 'mg-cat-body' + (collapsed?' collapsed':'');
          h.addEventListener('click', () => {
            if (treeCollapsed.has(key)) treeCollapsed.delete(key); else treeCollapsed.add(key);
            body.classList.toggle('collapsed');
            h.querySelector('.caret').textContent = body.classList.contains('collapsed') ? '▸' : '▾';
          });
          wrap.appendChild(h);
          wrap.appendChild(body);
          renderLevel(sub, lvIdx+1, depth+1, body);
        } else {
          h.className = 'mg-grp-head ' + lv.cls;
          if (lv.key === 'role') h.className += (v === '관리자' ? ' admin' : ' consultant');
          h.style.paddingLeft = (2 + depth*10) + 'px';
          h.innerHTML = `<span class="gl">${v}</span>`;
          wrap.appendChild(h);
          renderLevel(sub, lvIdx+1, depth+1, wrap);
        }
      });
    }

    function renderTree() {
      const wrap = document.getElementById('mg-tree');
      wrap.innerHTML = '';

      document.getElementById('mg-count').textContent = members.length;
      document.getElementById('mg-unread').textContent = '미답변 ' + sumU(members);

      const sections = [
        { key:'active',   label:'재직자', cls:'' },
        { key:'resigned', label:'퇴사자', cls:'resigned' },
      ].filter(s => !tree.state || tree.state === s.key);

      sections.forEach(sec => {
        let list = members.filter(m => m.state === sec.key);
        if (tree.cat) list = list.filter(m => grpOf(m) === tree.cat);
        if (tree.unreadOnly) list = list.filter(m => m.unread > 0);
        if (tree.q) list = list.filter(m => m.name.includes(tree.q));
        if (list.length === 0) return;

        const sh = document.createElement('div');
        sh.className = 'mg-section-head ' + sec.cls;
        sh.innerHTML = `<span class="dot"></span>${sec.label}
          <span class="meta">${list.length}명 · 미답변 <span class="u">${sumU(list)}</span></span>`;
        wrap.appendChild(sh);

        renderLevel(list, 0, 1, wrap);
      });

      if (!wrap.children.length) {
        wrap.innerHTML = '<div style="padding:14px 4px;color:#bbb;font-size:12px;text-align:center;">조건에 맞는 구성원이 없어요.</div>';
      }
    }

    // 컨트롤
    document.getElementById('mg-head').addEventListener('click', () => {
      const t = document.getElementById('mg-tree');
      t.classList.toggle('collapsed');
      document.getElementById('mg-arrow').textContent = t.classList.contains('collapsed') ? '∨' : '∧';
    });
    document.getElementById('mg-apply').addEventListener('click', () => {
      tree.state = document.getElementById('mg-state').value;
      tree.cat = document.getElementById('mg-cat').value;
      renderTree();
    });
    document.getElementById('mg-allbtn').addEventListener('click', () => {
      document.getElementById('mg-state').value = '';
      document.getElementById('mg-cat').value = '';
      tree.state = ''; tree.cat = '';
      renderTree();
    });
    document.getElementById('mg-reset').addEventListener('click', () => {
      document.getElementById('mg-state').value = '';
      document.getElementById('mg-cat').value = '';
      document.getElementById('mg-unreadonly').checked = false;
      tree.state=''; tree.cat=''; tree.unreadOnly=false; tree.sortByUnread=true;
      document.getElementById('mg-sort').textContent = '미답변순 ↓';
      renderTree();
    });
    document.getElementById('mg-unreadonly').addEventListener('change', e => {
      tree.unreadOnly = e.target.checked; renderTree();
    });
    document.getElementById('mg-sort').addEventListener('click', () => {
      tree.sortByUnread = !tree.sortByUnread;
      document.getElementById('mg-sort').textContent = tree.sortByUnread ? '미답변순 ↓' : '이름순 ↓';
      renderTree();
    });
    document.getElementById('mg-searchbox').addEventListener('input', e => {
      tree.q = e.target.value.trim(); renderTree();
    });

    // ========= 내 상담 (상담방 리스트) =========
    // state: new=신규인입(레드닷) / unanswered=미답변(연한 붉은 방) / normal
    let rooms = [
      { cust:'이정민', phone:'010-2345-6789', ch:'채팅', status:'상담중',   state:'unanswered', msg:'배송 언제쯤 도착하나요?',       time:'10:42', owner:'김용일' },
      { cust:'박서연', phone:'010-3456-7890', ch:'채팅', status:'상담중',   state:'new',        msg:'정수기 렌탈 문의드려요',         time:'10:40', owner:'김민강' },
      { cust:'최준호', phone:'010-4567-8901', ch:'전화', status:'주문확정', state:'unanswered', msg:'설치일 변경 가능한지 확인 부탁', time:'10:31', owner:'윤승현' },
      { cust:'김하늘', phone:'010-5678-9012', ch:'채팅', status:'설치대기', state:'new',        msg:'(신규 인입)',                   time:'10:25', owner:'곽예진' },
      { cust:'정유진', phone:'010-6789-0123', ch:'채팅', status:'상담중',   state:'normal',     msg:'네 확인했습니다 감사합니다!',    time:'09:58', owner:'강소정' },
      { cust:'오세훈', phone:'010-7890-1234', ch:'전화', status:'지원금대기', state:'normal',   msg:'지원금 서류 접수 완료',         time:'09:40', owner:'길수진' },
      { cust:'한지수', phone:'010-8901-2345', ch:'채팅', status:'주문확정', state:'unanswered', msg:'결제는 어떻게 진행하나요?',      time:'09:12', owner:'김시인' },
      { cust:'서동현', phone:'010-9012-3456', ch:'채팅', status:'상담중',   state:'normal',     msg:'알겠습니다',                    time:'어제', owner:'채새미' },
      { cust:'문가영', phone:'010-1122-3344', ch:'채팅', status:'계약완료', state:'normal',     msg:'계약서 잘 받았습니다 감사해요', time:'어제', owner:'김민강' },
    ];

    let mineFilter = 'all';      // all / new / unanswered
    let channelFilter = '';      // '' / 채팅 / 전화
    let statusFilter = '';       // '' / 상담중 / 주문확정 / 설치대기 / 지원금대기 / 계약완료
    const rank = { unanswered:0, new:1, normal:2 };  // 미답변 최상단 → 신규 → 일반

    function renderChats() {
      const wrap = document.getElementById('chat-list');
      wrap.innerHTML = '';
      // 상태 외 필터(채널/내담당/검색)를 먼저 적용한 base로 상태별 건수 계산
      let base = rooms.slice();
      if (channelFilter) base = base.filter(r => r.ch === channelFilter);
      if (mineFilter !== 'all') base = base.filter(r => r.state === mineFilter);
      const rq = (document.getElementById('room-search').value || '').trim();
      if (rq) base = base.filter(r => r.cust.includes(rq) || r.phone.replace(/-/g,'').includes(rq.replace(/-/g,'')));
      updateStatusCounts(base);

      let list = statusFilter ? base.filter(r => r.status === statusFilter) : base.slice();
      // 미답변 → 신규 → 일반 순 정렬
      list.sort((a,b) => rank[a.state] - rank[b.state]);

      if (list.length === 0) {
        wrap.innerHTML = '<div class="empty-state"><div class="empty-icon"></div><p>해당 상담이 없어요.</p></div>';
        updateChatCounts(); return;
      }

      list.forEach(r => {
        const i = rooms.indexOf(r);
        const el = document.createElement('div');
        el.className = 'room' + (r.state === 'unanswered' ? ' unanswered' : '') + (i === selectedRoom ? ' sel' : '');
        const nd = r.state === 'new' ? '<span class="nd"></span>' : '';
        const flag = r.state === 'unanswered'
          ? '<span class="un-flag">미답변</span>'
          : (r.state === 'new' ? '<span class="new-flag">신규 인입</span>' : '');
        el.innerHTML = `
          <div class="av">👤${nd}</div>
          <div class="body">
            <div class="top">
              <span class="nm">${r.cust}</span>
              <span class="ch ${r.ch==='전화'?'tm':''}">${r.ch==='전화'?'전화(TM)':'채팅'}</span>
              <span class="time">${r.time}</span>
            </div>
            <div class="msg">${r.msg}</div>
            <div class="tags"><span class="st">${r.status}</span>${flag}</div>
          </div>`;
        el.addEventListener('click', () => openRoom(i));
        wrap.appendChild(el);
      });
      updateChatCounts();
    }

    // ── 채팅방 열기 / 방 내부 뷰 ──
    let selectedRoom = null;
    function openRoom(idx) { selectedRoom = idx; renderChats(); renderRoomView(); }

    function renderRoomView() {
      const main = document.getElementById('chat-main');
      if (selectedRoom === null || !rooms[selectedRoom]) {
        main.innerHTML = `
          <div class="chat-topbar"><div class="skeleton" style="width:200px;"></div><div class="skeleton" style="width:80px;margin-left:auto;"></div></div>
          <div class="chat-body"><div class="chat-body-icon"></div><h3>상담을 선택해주세요.</h3><p>왼쪽 상담방을 선택하고<br>고객과 채팅 상담을 시작해요.</p></div>
          <div class="chat-footer"></div>`;
        return;
      }
      const r = rooms[selectedRoom];
      const chCls = r.ch === '전화' ? 'tm' : '';
      const chLabel = r.ch === '전화' ? '전화(TM)' : '채팅';
      const banner = r.state === 'unanswered'
        ? '<div class="un-banner">고객이 마지막으로 메시지를 남긴 <b>미답변</b> 상태예요. 응답을 보내면 자동 해제됩니다.</div>'
        : (r.state === 'new'
          ? '<div class="un-banner">아직 응답하지 않은 <b>신규 인입</b>입니다. 응답을 보내면 표시가 사라집니다.</div>' : '');
      const thread = (r.thread || []).map(t =>
        t.who === 'agent'
          ? `<div class="bubble agent">${t.text}<span class="meta">상담원 · 방금</span></div>`
          : `<div class="bubble cust">${t.text}<span class="meta">${r.cust} · 방금</span></div>`).join('');
      main.innerHTML = `
        <div class="chat-topbar">
          <div class="room-info"><span class="nm">${r.cust}</span><span class="phone-sm">${r.phone}</span><span class="ch ${chCls}">${chLabel}</span><span class="st">${r.status}</span></div>
          <button class="btn-sim" onclick="simulateCustomerReply(${selectedRoom}, event)">🔔 고객 답변(데모)</button>
        </div>
        ${banner}
        <div class="chat-msgs">
          <div class="bubble agent">안녕하세요, 무엇을 도와드릴까요?<span class="meta">상담원 · 09:30</span></div>
          <div class="bubble cust">${r.msg}<span class="meta">${r.cust} · ${r.time}</span></div>
          ${thread}
        </div>
        <div class="chat-input"><input id="msg-input" placeholder="메시지를 입력하세요" /><button class="send" onclick="sendMessage()">전송</button></div>`;
      const inp = document.getElementById('msg-input');
      if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
    }

    // 응답 전송 → 미답변 자동 해제
    function sendMessage() {
      if (selectedRoom === null) return;
      const inp = document.getElementById('msg-input');
      const val = (inp.value || '').trim();
      if (!val) return;
      const r = rooms[selectedRoom];
      r.thread = r.thread || [];
      r.thread.push({ who: 'agent', text: val });
      r.state = 'normal';   // 응답했으므로 미답변/신규 해제 → 내 상담으로
      renderChats();
      renderRoomView();
    }

    // 고객 답변 시뮬레이션 → 미답변으로 전환 (데모용)
    function simulateCustomerReply(idx, ev) {
      if (ev) ev.stopPropagation();
      const r = rooms[idx];
      r.thread = r.thread || [];
      r.thread.push({ who: 'cust', text: '추가로 문의가 있어요!' });
      r.state = 'unanswered';
      renderChats();
      renderRoomView();
    }

    function updateStatusCounts(base) {
      document.querySelectorAll('#status-tags .tag').forEach(t => {
        const s = t.dataset.status;
        const c = s ? base.filter(r => r.status === s).length : base.length;
        t.innerHTML = `${s || '전체'} <span class="tag-cnt">${c}</span>`;
      });
    }

    function updateChatCounts() {
      const cnt = (st, ch) => rooms.filter(r => r.state === st && (!ch || r.ch === ch)).length;
      // 내 담당
      document.getElementById('cnt-mine').textContent = rooms.length;
      document.getElementById('cnt-new').textContent = cnt('new');
      document.getElementById('cnt-unans').textContent = cnt('unanswered');
      // 팀 전체 (전체 = 신규 + 미답변)
      document.getElementById('tcnt-all').textContent = cnt('new') + cnt('unanswered');
      document.getElementById('tcnt-new').textContent = cnt('new');
      document.getElementById('tcnt-new-chat').textContent = cnt('new', '채팅');
      document.getElementById('tcnt-new-tel').textContent = cnt('new', '전화');
      document.getElementById('tcnt-unans').textContent = cnt('unanswered');
      document.getElementById('tcnt-unans-chat').textContent = cnt('unanswered', '채팅');
      document.getElementById('tcnt-unans-tel').textContent = cnt('unanswered', '전화');
    }

    // 미답변 해제 (채팅방 내부에서 처리)
    function clearUnanswered(idx, ev) {
      if (ev) ev.stopPropagation();
      rooms[idx].state = 'normal';
      renderChats();
      renderRoomView();
    }

    // 팀 전체 신규/미답변 → 채팅·전화 하위 토글
    document.querySelectorAll('#view-inbox .grp-caret').forEach(c => {
      c.addEventListener('click', e => {
        e.stopPropagation();
        const g = c.dataset.toggle;
        const collapsed = c.classList.toggle('collapsed');
        c.textContent = collapsed ? '▸' : '▾';
        document.querySelectorAll(`#view-inbox .sub-item[data-group="${g}"]`).forEach(s =>
          s.classList.toggle('nav-hidden', collapsed));
      });
    });

    // 내 담당 / 팀 전체 사이드바 → 상담 리스트 필터
    document.querySelectorAll('#view-inbox .nav-item[data-mine]').forEach(it => {
      it.addEventListener('click', () => {
        document.querySelectorAll('#view-inbox .nav-item[data-mine]').forEach(x => x.classList.remove('active'));
        it.classList.add('active');
        mineFilter = it.dataset.mine;
        channelFilter = it.dataset.ch || '';
        const titles = { all:'내 상담', new:'신규인입', unanswered:'미답변' };
        const scope = it.dataset.team ? '[팀 전체] ' : '';
        const chLabel = channelFilter ? ' · ' + (channelFilter === '전화' ? '전화(TM)' : '채팅') : '';
        document.getElementById('chat-title').textContent = scope + titles[mineFilter] + chLabel;
        // 채널 서브탭 동기화
        document.querySelectorAll('#channel-tabs .subtab').forEach(t =>
          t.classList.toggle('active', t.dataset.ch === channelFilter));
        renderChats();
      });
    });

    // 채널 서브탭 (TM / 채팅)
    document.querySelectorAll('#channel-tabs .subtab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('#channel-tabs .subtab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        channelFilter = t.dataset.ch;
        renderChats();
      });
    });

    // 채팅방 검색 (이름/전화번호)
    document.getElementById('room-search').addEventListener('input', renderChats);

    // 상태 태그 필터
    document.querySelectorAll('#status-tags .tag').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('#status-tags .tag').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        statusFilter = t.dataset.status;
        renderChats();
      });
    });

    genRooms();
    render();
    renderTree();
    renderChats();
    renderRoomView();
  </script>

</body>
</html>
